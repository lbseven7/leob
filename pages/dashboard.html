<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" href="../images/logo-black3-sbg.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:     'hsl(0 0% 4%)',
            fg:     'hsl(40 10% 94%)',
            card:   'hsl(0 0% 6%)',
            muted:  'hsl(0 0% 55%)',
            accent: '#d88800',
            border: 'hsl(0 0% 14%)',
            brand:  { orange: '#d88800' },
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body:    ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    ::selection { background: #d888004d; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: hsl(0 0% 4%); }
    ::-webkit-scrollbar-thumb { background: hsl(0 0% 14%); border-radius: 4px; }

    .fade-in  { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .swatch-grow { animation: growUp 0.4s ease-out; transform-origin: bottom; }
    @keyframes growUp  { from { transform: scaleY(0); } to { transform: scaleY(1); } }

    /* Slider custom styling */
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: hsl(0 0% 14%); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }
    input[type=range]::-moz-range-thumb    { width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }

    /* Upload zone drag-over */
    .drag-over { border-color: #d88800 !important; background: #d8880010 !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Premium overlay */
    .premium-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    .premium-modal {
      background: hsl(0 0% 6%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    /* Impress�o */
    @media print {
      body * { visibility: hidden; }
      #print-target, #print-target * {
        visibility: visible;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      #print-target { position: absolute; top: 0; left: 0; width: 100%; }
      nav, .no-print, #imp-preview-wrap { border: none !important; background: none !important; padding: 0 !important; }
      @page { margin: 12mm; }
    }
  </style>
</head>

  <main id="app" class="pt-14 md:pt-16 md:ml-60"></main>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }
  </script>
  <script src="../js/dashboard.js"></script>
