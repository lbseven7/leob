<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Leo Barbosa Art Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { orange: '#d88800' } },
                    fontFamily: {
                        sans: ['Comfortaa', 'cursive', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/barra-progresso.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-white text-black dark:bg-black dark:text-white transition-colors duration-500 antialiased">
    <div id="custom-cursor"></div>

    <!-- Header -->
    <header
        class="bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-neutral-200 dark:border-neutral-900 px-4 sm:px-6 py-4 sm:py-6 sticky top-0 z-50">
        <div class="container mx-auto max-w-5xl flex items-center justify-between gap-4">
            <a href="../index.html">
                <img id="header-logo" src="../images/logo/logo-white-gold-removebg-preview.png" alt="Logo"
                    class="max-w-[80px] sm:max-w-[100px] h-auto opacity-100 transition-opacity duration-300">
            </a>
            <div class="flex items-center gap-3 sm:gap-6">
                <a href="../index.html"
                    class="hidden md:inline-block text-xs sm:text-sm uppercase tracking-widest hover:text-brand-orange transition whitespace-nowrap">Catálogo</a>
                <a href="eventos.html"
                    class="hidden md:inline-block text-xs sm:text-sm uppercase tracking-widest hover:text-brand-orange transition whitespace-nowrap">Eventos</a>
                <a href="blog.html"
                    class="hidden md:inline-block text-xs sm:text-sm uppercase tracking-widest text-brand-orange border-b-2 border-brand-orange pb-1 whitespace-nowrap">Blog</a>
                <a href="sobre.html"
                    class="hidden md:inline-block text-xs sm:text-sm uppercase tracking-widest hover:text-brand-orange transition whitespace-nowrap">Sobre</a>
                <button id="darkModeToggle"
                    class="w-10 h-10 rounded-full bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors">
                    <i id="darkModeIcon" class="fas fa-sun text-yellow-500"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-5xl px-6 py-16">

        <!-- Hero do Blog -->
        <section class="mb-16">
            <p class="text-[10px] uppercase tracking-[0.28em] text-zinc-400 mb-4">Artigos & Reflexões</p>
            <h1 class="serif text-4xl sm:text-5xl font-normal mb-4">Blog</h1>
            <div class="h-1 w-20 bg-brand-orange mb-6"></div>
            <p class="text-neutral-600 dark:text-neutral-400 max-w-2xl text-lg leading-relaxed">
                Técnicas de pintura, bastidores, dicas práticas e reflexões sobre arte e criação.
            </p>
        </section>

        <!-- Filtros de Categoria -->
        <section class="mb-12">
            <div id="blog-filters"
                class="flex flex-wrap gap-2 text-[10px] sm:text-xs font-bold uppercase tracking-wide sm:tracking-widest">
                <button onclick="filterPosts('todos')"
                    class="blog-filter-btn active border border-zinc-200 dark:border-zinc-800 px-4 py-2 transition-all hover:border-brand-orange">Todos</button>
                <button onclick="filterPosts('tecnicas')"
                    class="blog-filter-btn border border-zinc-200 dark:border-zinc-800 px-4 py-2 transition-all hover:border-brand-orange">Técnicas</button>
                <button onclick="filterPosts('bastidores')"
                    class="blog-filter-btn border border-zinc-200 dark:border-zinc-800 px-4 py-2 transition-all hover:border-brand-orange">Bastidores</button>
                <button onclick="filterPosts('dicas')"
                    class="blog-filter-btn border border-zinc-200 dark:border-zinc-800 px-4 py-2 transition-all hover:border-brand-orange">Dicas</button>
                <button onclick="filterPosts('reflexoes')"
                    class="blog-filter-btn border border-zinc-200 dark:border-zinc-800 px-4 py-2 transition-all hover:border-brand-orange">Reflexões</button>
            </div>
        </section>

        <!-- Grid de Posts -->
        <section>
            <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8 sm:gap-10">
                <!-- Posts inseridos via JS -->
            </div>

            <!-- Estado vazio -->
            <div id="blog-empty" class="hidden text-center py-20">
                <i class="fas fa-pen-nib text-4xl text-zinc-300 dark:text-zinc-700 mb-4"></i>
                <p class="text-zinc-400 dark:text-zinc-600 text-sm uppercase tracking-widest">Nenhum artigo encontrado</p>
            </div>

            <!-- Loading -->
            <div id="blog-loading" class="text-center py-20">
                <div class="inline-block w-6 h-6 border-2 border-zinc-200 dark:border-zinc-800 border-t-brand-orange rounded-full animate-spin"></div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="border-t border-neutral-200 dark:border-neutral-800 py-12 text-center opacity-60">
        <div class="container mx-auto max-w-5xl px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-neutral-500">&copy; 2026 Leo Barbosa Art Studio</p>
                <div class="flex items-center gap-6 text-xl">
                    <a href="https://wa.me/5573988279832" target="_blank" aria-label="WhatsApp"
                        class="hover:text-brand-orange transition"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="https://www.instagram.com/leob_pinturas/" target="_blank" aria-label="Instagram"
                        class="hover:text-brand-orange transition"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.youtube.com/@leobarbosa-art-studio" target="_blank" aria-label="YouTube"
                        class="hover:text-brand-orange transition"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const categoryLabels = {
            tecnicas: 'Técnicas',
            bastidores: 'Bastidores',
            dicas: 'Dicas',
            reflexoes: 'Reflexões'
        };

        let allPosts = [];
        let currentFilter = 'todos';

        async function loadPosts() {
            const grid = document.getElementById('blog-grid');
            const empty = document.getElementById('blog-empty');
            const loading = document.getElementById('blog-loading');

            try {
                const resp = await fetch('../posts/index.json');
                if (!resp.ok) throw new Error('index.json não encontrado');
                allPosts = await resp.json();
            } catch (e) {
                allPosts = [];
            }

            loading.classList.add('hidden');

            if (allPosts.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            renderPosts();
        }

        function renderPosts() {
            const grid = document.getElementById('blog-grid');
            const empty = document.getElementById('blog-empty');

            const filtered = currentFilter === 'todos'
                ? allPosts
                : allPosts.filter(p => p.category === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');

            grid.innerHTML = filtered.map(post => {
                const cat = post.category || 'tecnicas';
                const catLabel = categoryLabels[cat] || cat;
                const date = post.date || '';
                const readTime = post.tempoLeitura || '5 min';
                const desc = post.description || '';
                const img = post.image || '';
                const href = post.href || '#';

                const imgHtml = img
                    ? `<div class="aspect-[16/10] overflow-hidden bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800">
                            <img src="../${img}" alt="${post.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        </div>`
                    : `<div class="aspect-[16/10] bg-gradient-to-br from-neutral-100 to-neutral-200 dark:from-neutral-900 dark:to-neutral-800 border border-neutral-200 dark:border-neutral-800 flex items-center justify-center">
                            <i class="fas fa-pen-nib text-3xl text-brand-orange/40"></i>
                        </div>`;

                return `
                    <a href="../${href}" class="group block">
                        ${imgHtml}
                        <div class="mt-5">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="text-[10px] uppercase tracking-[0.28em] font-bold text-brand-orange">${catLabel}</span>
                                ${date ? `<span class="text-[10px] uppercase tracking-[0.2em] text-zinc-400">${date}</span>` : ''}
                            </div>
                            <h3 class="serif text-xl sm:text-2xl font-normal leading-snug mb-2 group-hover:text-brand-orange transition-colors">${post.title}</h3>
                            <p class="text-sm text-neutral-500 dark:text-neutral-400 leading-relaxed line-clamp-2">${desc}</p>
                            <div class="flex items-center gap-2 mt-4 text-[10px] uppercase tracking-[0.2em] text-zinc-400">
                                <i class="far fa-clock"></i>
                                <span>${readTime} de leitura</span>
                            </div>
                        </div>
                    </a>`;
            }).join('');
        }

        function filterPosts(cat) {
            currentFilter = cat;

            document.querySelectorAll('.blog-filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-black', 'text-white', 'dark:bg-white', 'dark:text-black');
            });

            const activeBtn = document.querySelector(`.blog-filter-btn[onclick="filterPosts('${cat}')"]`);
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-black', 'text-white', 'dark:bg-white', 'dark:text-black');
            }

            renderPosts();
        }

        loadPosts();
    </script>

    <script>
        // Dark Mode
        const toggle = document.getElementById('darkModeToggle');
        const icon = document.getElementById('darkModeIcon');
        toggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            icon.className = isDark ? 'fas fa-moon text-blue-300' : 'fas fa-sun text-yellow-500';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            icon.className = 'fas fa-sun text-yellow-500';
        } else {
            document.documentElement.classList.add('dark');
            icon.className = 'fas fa-moon text-blue-300';
        }
    </script>
    <script>
        // Custom cursor
        const cursor = document.getElementById('custom-cursor');
        const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
        if (!isTouchDevice && cursor) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            document.querySelectorAll('a, button, .group').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(2.4)';
                    cursor.style.backgroundColor = 'rgba(249, 115, 22, 0.28)';
                });
                el.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.backgroundColor = '';
                });
            });
        } else if (cursor) {
            cursor.style.display = 'none';
        }
    </script>
</body>

</html>
