<script>
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('container-fotos');
        if (container && typeof bastidores !== 'undefined') {
            container.innerHTML = bastidores.map(item => `
                <article class="border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-4">
                    <div class="w-full">
                        <img src="${item.imagem}" alt="${item.titulo}" class="w-full h-auto object-contain">
                        <span class="inline-block mt-4 bg-zinc-100 dark:bg-zinc-800 text-[10px] px-3 py-1 uppercase tracking-[0.25em]">${item.tipo}</span>
                    </div>
                    <div class="pt-6">
                        <p class="text-[10px] uppercase tracking-[0.3em] text-orange-500 mb-2">${item.data}</p>
                        <h3 class="text-xl font-medium mb-2">${item.titulo}</h3>
                    </div>
                </article>
            `).join('');
        }
    });
</script>
