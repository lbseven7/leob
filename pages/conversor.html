<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de Valores - Conversor de Risco Linear</title>
    <style>
        /* RESET E TIPOGRAFIA DA PLATAFORMA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* CORES OFICIAIS (Fundo Escuro Absoluto do seu site) */
        body {
            background-color: #0b0b0b;
            color: #e0e0e0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: #888888;
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ÁREA DE UPLOAD */
        .upload-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .upload-button {
            width: 100%;
            background-color: #111111;
            border: 1px dashed #333333;
            padding: 3.5rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #aaaaaa;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .upload-button:hover {
            border-color: #ff6b00;
            /* Laranja Ativo do seu site */
            background-color: #161616;
            color: #ffffff;
        }

        .upload-button input[type="file"] {
            display: none;
        }

        /* PAINEL DE CONTROLE */
        .controls-container {
            display: none;
            /* Ativado via JS */
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            background-color: #111111;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #222222;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .controls-container {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-grow: 1;
        }

        .control-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888888;
        }

        #threshold-slider {
            width: 100%;
            accent-color: #ff6b00;
            background: #222222;
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .download-button {
            background-color: #ff6b00;
            color: #ffffff;
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .download-button:hover {
            background-color: #e56000;
        }

        /* CONTAINER DE VISUALIZAÇÃO */
        .preview-container {
            display: flex;
            justify-content: center;
            background-color: #000000;
            border-radius: 8px;
            border: 1px solid #222222;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: none;
            background-color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Conversor de Risco Linear</h1>
            <p class="subtitle">Ferramenta de apoio ao hiper-realismo. Transforme sua referência em linhas estruturais
                limpas para guiar seu decalque ou esboço inicial.</p>
        </header>

        <main>
            <!-- Upload -->
            <div class="upload-container">
                <label for="image-input" class="upload-button">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span>Carregar Imagem de Referência</span>
                    <input type="file" id="image-input" accept="image/*">
                </label>
            </div>

            <!-- Painel de Controle -->
            <div id="controls-container" class="controls-container">
                <div class="control-group">
                    <label for="threshold-slider">Sensibilidade do Traço (Quantidade de Detalhes)</label>
                    <input type="range" id="threshold-slider" min="5" max="60" value="25">
                </div>
                <button id="download-btn" class="download-button">Baixar Risco (.png)</button>
            </div>

            <!-- Tela de Exibição -->
            <div class="preview-container">
                <canvas id="output-canvas"></canvas>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const imageInput = document.getElementById('image-input');
            const canvas = document.getElementById('output-canvas');
            const ctx = canvas.getContext('2d');
            const controlsContainer = document.getElementById('controls-container');
            const thresholdSlider = document.getElementById('threshold-slider');
            const downloadBtn = document.getElementById('download-btn');

            let imgOriginal = new Image();

            // Evita travamento de segurança de leitura de pixels locais
            imgOriginal.crossOrigin = "anonymous";

            // 1. GERENCIAMENTO DE ARQUIVO USANDO OBJECT URL (Muito mais seguro e rápido)
            imageInput.addEventListener('change', (e) => {
                const arquivo = e.target.files[0];
                if (!arquivo) return;

                // Cria uma URL direta em memória para contornar o bloqueio do Canvas
                imgOriginal.src = URL.createObjectURL(arquivo);
            });

            imgOriginal.onload = () => {
                // Limita a dimensão máxima para manter o processamento fluido
                const maxDimensao = 1000;
                let largura = imgOriginal.width;
                let altura = imgOriginal.height;

                if (largura > maxDimensao || altura > maxDimensao) {
                    if (largura > altura) {
                        altura = Math.round((maxDimensao / largura) * altura);
                        largura = maxDimensao;
                    } else {
                        largura = Math.round((maxDimensao / altura) * largura);
                        altura = maxDimensao;
                    }
                }

                canvas.width = largura;
                canvas.height = altura;
                canvas.style.display = 'block';
                controlsContainer.style.display = 'flex';

                processarFiltroRisco();
            };

            thresholdSlider.addEventListener('input', processarFiltroRisco);

            // 2. ALGORITMO CORRIGIDO DE PROCESSAMENTO DE PIXELS
            function processarFiltroRisco() {
                if (!imgOriginal.src || canvas.width === 0) return;

                // Limpa e desenha a imagem original para leitura limpa
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(imgOriginal, 0, 0, canvas.width, canvas.height);

                try {
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const pixels = imgData.data;
                    const w = canvas.width;
                    const h = canvas.height;

                    const outputImgData = ctx.createImageData(w, h);
                    const outPixels = outputImgData.data;

                    const sensibilidade = parseInt(thresholdSlider.value);

                    // Varredura de bordas baseada em relevo de luminância local
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const idx = (y * w + x) * 4;

                            // Se atingir as bordas extremas da foto, mantém branco para não dar erro de leitura de vizinhos
                            if (x === w - 1 || y === h - 1) {
                                outPixels[idx] = outPixels[idx + 1] = outPixels[idx + 2] = 255;
                                outPixels[idx + 3] = 255;
                                continue;
                            }

                            const idxDireita = (y * w + (x + 1)) * 4;
                            const idxBaixo = ((y + 1) * w + x) * 4;

                            // Conversão balanceada para Tons de Cinza
                            const lumAtual = 0.299 * pixels[idx] + 0.587 * pixels[idx + 1] + 0.114 * pixels[idx + 2];
                            const lumDireita = 0.299 * pixels[idxDireita] + 0.587 * pixels[idxDireita + 1] + 0.114 * pixels[idxDireita + 2];
                            const lumBaixo = 0.299 * pixels[idxBaixo] + 0.587 * pixels[idxBaixo + 1] + 0.114 * pixels[idxBaixo + 2];

                            // Gradiente de contraste
                            const diffX = Math.abs(lumAtual - lumDireita);
                            const diffY = Math.abs(lumAtual - lumBaixo);
                            const magnitude = diffX + diffY;

                            // Pinta preto se passar da sensibilidade (borda encontrada) ou branco para fundo
                            const corContorno = magnitude > sensibilidade ? 0 : 255;

                            outPixels[idx] = corContorno;
                            outPixels[idx + 1] = corContorno;
                            outPixels[idx + 2] = corContorno;
                            outPixels[idx + 3] = 255;
                        }
                    }

                    // Renderiza o traço final na tela do aluno
                    ctx.putImageData(outputImgData, 0, 0);
                } catch (e) {
                    console.error("Erro de segurança no Canvas corrigido automaticamente: ", e);
                }
            }

            // 3. DOWNLOAD DO RISCO (.PNG)
            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = 'risco-guiado-leob.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

</body>

</html>
