<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização do Certificado | Léo Barbosa Art Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f4f4; /* Fundo cinza claro para destacar a imagem */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container que centraliza e dá um efeito de 'folha sobre a mesa' */
        .wrapper-certificado {
            background: white;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 1060px; /* Largura máxima do certificado original */
            width: 100%;
            position: relative;
            margin-bottom: 20px;
        }

        /* NOVA ESTRUTURA RESPONSIVA DA IMAGEM */
        .img-certificado {
            display: block;
            width: 100%; /* O certificado ocupa toda a largura disponível do wrapper */
            height: auto; /* Mantém a proporção de 1060x750 automaticamente */
            border: 1px solid #eaeaea; /* Borda sutil */
        }

        .status-rodape {
            text-align: center;
            font-size: 13px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .download-btn {
            display: none;
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }

        .download-btn:hover {
            background: #1a252f;
        }

        /* Ajustes para telas muito pequenas (celulares menores) */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .wrapper-certificado {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper-certificado">
        <img id="certificado-imagem" class="img-certificado" src="images/placeholder-carregando.jpg" alt="Carregando Certificado Autêntico...">
    </div>

    <div class="status-rodape">
        <p>Certificado Autêntico Validado</p>
        <a id="download-btn" href="#" download style="display: none; margin-top: 15px; padding: 12px 24px; background-color: #d88800; color: white; text-decoration: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.5px;">Baixar Certificado</a>
    </div>

    <script>
        // Lógica para pegar o token da URL e exibir a imagem correspondente
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const imgElement = document.getElementById('certificado-imagem');
        const statusElement = document.querySelector('.status-rodape p');

        if (token) {
            // Anti-cache SUPER FORTE: timestamp + random number
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2, 10);
            const caminhoImagem = `../images/certificados/${token}.png?t=${timestamp}&r=${random}`;
            const downloadBtn = document.getElementById('download-btn');
            
            console.log('Tentando carregar:', caminhoImagem);
            console.log('Token:', token);
            
            imgElement.alt = `Certificado Autêntico - Obra ${token}`;
            document.title = `Certificado - Obra ${token} | Leo Barbosa`;
            
            // Resetar a imagem para forçar recarregamento
            imgElement.src = '';
            imgElement.removeAttribute('srcset');
            downloadBtn.style.display = 'none';
            
            // Tratar erro de carregamento
            imgElement.onerror = function() {
                statusElement.textContent = 'carregando o certificado';
                statusElement.style.color = '#d88800';
                console.error('Falha ao carregar:', caminhoImagem);
                downloadBtn.style.display = 'none';
            };
            
            imgElement.onload = function() {
                statusElement.textContent = 'Certificado Autêntico Validado';
                statusElement.style.color = '#777';
                // Mostrar e configurar botão de download
                downloadBtn.style.display = 'inline-block';
                downloadBtn.href = `../images/certificados/${token}.png`;
                downloadBtn.download = `Certificado-${token}.png`;
            };
            
            // Carregar a imagem
            setTimeout(() => {
                imgElement.src = caminhoImagem;
            }, 100);
        } else {
            document.body.innerHTML = "<h1 style='color:#c0392b; font-family:Montserrat,sans-serif; text-align:center;'>⚠ Erro: Certificado não encontrado.<br><span style='font-size:16px; font-weight:normal; color:#555;'>Por favor, tente escanear o QR Code novamente.</span></h1>";
        }
    </script>

</body>
</html>
