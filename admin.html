<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão | leob.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { orange: '#F97316' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Comfortaa', cursive; background: #f6f2eb; color: #171717; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header Simples -->
    <header class="w-full bg-black text-white py-4 px-6 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-4">
            <img src="images/logo-laranja-branco-removebg-preview.png" alt="leob." class="h-8">
            <span class="text-sm tracking-widest uppercase opacity-70 border-l border-white/20 pl-4">Gestão de Obras</span>
        </div>
        <button onclick="configurarAPI()" class="text-xs text-brand-orange hover:text-white transition"><i class="fa-solid fa-gear mr-2"></i>Configurar Planilha</button>
    </header>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
        
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="serif text-3xl font-bold mb-2">Controle de Vendas e Entregas</h1>
                <p class="text-sm text-zinc-600">Acompanhe a numeração das tiragens e o status dos clientes.</p>
            </div>
            <button onclick="abrirModal()" class="bg-brand-orange text-white px-6 py-3 font-bold uppercase tracking-widest text-xs hover:bg-black transition shadow-lg">
                <i class="fa-solid fa-plus mr-2"></i> Novo Registro
            </button>
        </div>

        <!-- Tabela -->
        <div class="bg-white shadow-xl overflow-hidden border border-zinc-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-100 text-xs uppercase tracking-widest text-zinc-500">
                            <th class="p-4 border-b border-zinc-200">Data</th>
                            <th class="p-4 border-b border-zinc-200">Cliente</th>
                            <th class="p-4 border-b border-zinc-200">Obra</th>
                            <th class="p-4 border-b border-zinc-200">Tiragem</th>
                            <th class="p-4 border-b border-zinc-200">Status</th>
                            <th class="p-4 border-b border-zinc-200">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="text-sm">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-zinc-500">Carregando dados da planilha...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Novo Registro -->
    <div id="modal-registro" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 w-full max-w-lg shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="serif text-2xl font-bold">Novo Registro</h2>
                <button onclick="fecharModal()" class="text-zinc-400 hover:text-black"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="form-registro" class="space-y-4">
                <input type="hidden" id="linha-id" value="">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-1">Nome do Cliente</label>
                    <input type="text" id="cliente" required class="w-full p-3 border border-zinc-300 bg-zinc-50 focus:border-brand-orange outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-1">Obra</label>
                    <select id="obra" required class="w-full p-3 border border-zinc-300 bg-zinc-50 focus:border-brand-orange outline-none">
                        <option value="Casa do Vaqueiro">Casa do Vaqueiro</option>
                        <option value="Caminho da Luz">Caminho da Luz</option>
                        <!-- Adicione outras obras aqui -->
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-1">Tiragem (Ex: 1/10)</label>
                        <input type="text" id="tiragem" required class="w-full p-3 border border-zinc-300 bg-zinc-50 focus:border-brand-orange outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-1">Status</label>
                        <select id="status" class="w-full p-3 border border-zinc-300 bg-zinc-50 focus:border-brand-orange outline-none">
                            <option value="Pago">Pago</option>
                            <option value="Certificado Emitido">Certificado Emitido</option>
                            <option value="Enviado">Enviado</option>
                            <option value="Entregue">Entregue</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-1">Observações (Endereço, WhatsApp...)</label>
                    <textarea id="observacoes" rows="3" class="w-full p-3 border border-zinc-300 bg-zinc-50 focus:border-brand-orange outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-black text-white py-4 font-bold uppercase tracking-[0.2em] hover:bg-brand-orange transition mt-4">
                    Salvar na Planilha
                </button>
            </form>
        </div>
    </div>

    <script>
        let apiUrl = localStorage.getItem('leob_sheet_api') || '';

        function configurarAPI() {
            const url = prompt("Cole aqui a URL do seu Google Apps Script (Web App):", apiUrl);
            if (url !== null) {
                apiUrl = url;
                localStorage.setItem('leob_sheet_api', apiUrl);
                carregarDados();
            }
        }

        async function carregarDados() {
            const tbody = document.getElementById('tabela-corpo');
            if (!apiUrl) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-brand-orange font-bold">⚠️ Clique em "Configurar Planilha" no topo para conectar seu Google Sheets.</td></tr>';
                return;
            }

            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-zinc-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Carregando...</td></tr>';

            try {
                const response = await fetch(apiUrl);
                const dados = await response.json();
                
                if (dados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-zinc-500">Nenhum registro encontrado na planilha.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                dados.forEach((linha, index) => {
                    // Define a cor do badge de status
                    let statusColor = 'bg-zinc-200 text-zinc-700';
                    if(linha.Status === 'Pago') statusColor = 'bg-green-100 text-green-800';
                    if(linha.Status === 'Certificado Emitido') statusColor = 'bg-yellow-100 text-yellow-800';
                    if(linha.Status === 'Enviado') statusColor = 'bg-blue-100 text-blue-800';
                    if(linha.Status === 'Entregue') statusColor = 'bg-purple-100 text-purple-800';

                    // Transformar os dados em JSON para passar no botão
                    const dadosJSON = encodeURIComponent(JSON.stringify({...linha, index: index + 2})); // +2 porque linha 1 é cabeçalho

                    tbody.innerHTML += `
                        <tr class="hover:bg-zinc-50 transition border-b border-zinc-100">
                            <td class="p-4">${new Date(linha.Data).toLocaleDateString('pt-BR')}</td>
                            <td class="p-4 font-bold">
                                ${linha.Cliente}
                                <div class="text-[10px] font-normal text-zinc-500 mt-1 truncate max-w-[150px]">${linha.Observacoes || ''}</div>
                            </td>
                            <td class="p-4">${linha.Obra}</td>
                            <td class="p-4"><span class="bg-black text-white px-2 py-1 text-xs font-bold tracking-widest">${linha.Tiragem}</span></td>
                            <td class="p-4"><span class="px-2 py-1 text-xs font-bold uppercase tracking-wider ${statusColor}">${linha.Status}</span></td>
                            <td class="p-4">
                                <button onclick="editarRegistro('${dadosJSON}')" class="text-zinc-400 hover:text-brand-orange transition px-2 py-1" title="Editar">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-500">Erro ao carregar os dados. Verifique a URL do Google Script.</td></tr>';
            }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!apiUrl) return alert("Configure a URL da planilha primeiro!");

            const btn = e.target.querySelector('button');
            const textoOriginal = btn.innerText;
            btn.innerText = 'Salvando...';
            btn.disabled = true;

            const dados = {
                action: document.getElementById('linha-id').value ? 'edit' : 'add',
                row: document.getElementById('linha-id').value,
                Cliente: document.getElementById('cliente').value,
                Obra: document.getElementById('obra').value,
                Tiragem: document.getElementById('tiragem').value,
                Status: document.getElementById('status').value,
                Observacoes: document.getElementById('observacoes').value
            };

            try {
                await fetch(apiUrl, {
                    method: 'POST',
                    mode: 'no-cors', // Necessário para o Google Apps Script não bloquear
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                fecharModal();
                e.target.reset();
                alert("Registro salvo com sucesso!");
                // Recarrega os dados após 2 segundos para dar tempo do Google processar
                setTimeout(carregarDados, 2000); 
            } catch (error) {
                alert("Erro ao salvar. Tente novamente.");
            } finally {
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }
        });

        function abrirModal() { 
            document.getElementById('form-registro').reset();
            document.getElementById('linha-id').value = '';
            document.querySelector('#modal-registro h2').innerText = 'Novo Registro';
            document.getElementById('modal-registro').classList.remove('hidden'); 
        }
        
        function fecharModal() { document.getElementById('modal-registro').classList.add('hidden'); }

        function editarRegistro(dadosJSON) {
            const dados = JSON.parse(decodeURIComponent(dadosJSON));
            
            document.getElementById('linha-id').value = dados.index;
            document.getElementById('cliente').value = dados.Cliente;
            document.getElementById('obra').value = dados.Obra;
            document.getElementById('tiragem').value = dados.Tiragem;
            document.getElementById('status').value = dados.Status;
            document.getElementById('observacoes').value = dados.Observacoes;
            
            document.querySelector('#modal-registro h2').innerText = 'Editar Registro';
            document.getElementById('modal-registro').classList.remove('hidden');
        }

        // Inicia carregando os dados
        carregarDados();
    </script>
</body>
</html>
